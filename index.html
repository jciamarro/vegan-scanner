<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is It Vegan?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1a0f;
    --surface: #162016;
    --border: #2a3a2a;
    --green: #6fcf6f;
    --green-dim: #2d4a2d;
    --red: #e05252;
    --red-dim: #4a1f1f;
    --yellow: #f0c060;
    --yellow-dim: #4a3a10;
    --text: #e0ead0;
    --muted: #7a9a7a;
    --font: system-ui, -apple-system, sans-serif;
    --font-mono: 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 20px 16px 40px;
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--green);
    line-height: 1;
    margin-bottom: 4px;
  }

  header p {
    font-size: 13px;
    color: var(--muted);
  }

  /* UPLOAD ZONE */
  #upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 16px;
    position: relative;
  }

  #upload-zone:hover, #upload-zone.drag-over {
    border-color: var(--green);
    background: var(--green-dim);
  }

  #upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  #upload-icon {
    font-size: 36px;
    margin-bottom: 8px;
  }

  #upload-zone p {
    font-size: 14px;
    color: var(--muted);
  }

  #upload-zone strong {
    color: var(--green);
  }

  /* PREVIEW */
  #preview-wrap {
    display: none;
    margin-bottom: 16px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }

  #preview-img {
    width: 100%;
    max-height: 240px;
    object-fit: contain;
    background: var(--surface);
    display: block;
  }

  #clear-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 14px;
    cursor: pointer;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* SCAN BUTTON */
  #scan-btn {
    width: 100%;
    padding: 16px;
    background: var(--green);
    color: #0f1a0f;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.02em;
    margin-bottom: 20px;
    display: none;
    font-family: var(--font-mono);
    text-transform: uppercase;
  }

  #scan-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* LOADING */
  #loading {
    display: none;
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESULT */
  #result {
    display: none;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  #verdict-bar {
    padding: 20px;
    text-align: center;
  }

  #verdict-bar.vegan { background: var(--green-dim); border: 1px solid var(--green); }
  #verdict-bar.not-vegan { background: var(--red-dim); border: 1px solid var(--red); }
  #verdict-bar.maybe { background: var(--yellow-dim); border: 1px solid var(--yellow); }

  #verdict-emoji { font-size: 40px; margin-bottom: 6px; }

  #verdict-text {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.01em;
  }

  .vegan #verdict-text { color: var(--green); }
  .not-vegan #verdict-text { color: var(--red); }
  .maybe #verdict-text { color: var(--yellow); }

  #verdict-caveat {
    font-size: 12px;
    margin-top: 6px;
    opacity: 0.8;
  }

  #flags-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 16px;
  }

  #flags-section h3 {
    font-size: 11px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .flag-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .flag-item:last-child { border-bottom: none; }

  .flag-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .flag-dot.red { background: var(--red); }
  .flag-dot.yellow { background: var(--yellow); }

  .flag-name { font-weight: 600; color: var(--text); }
  .flag-note { color: var(--muted); font-size: 12px; margin-top: 2px; }

  /* SCAN AGAIN */
  #again-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    display: none;
  }

  #again-btn:hover { border-color: var(--green); color: var(--green); }

  #error-msg {
    display: none;
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Is It Vegan?</h1>
  <p>Scan an ingredient label to find out</p>
</header>

<div id="upload-zone">
  <input type="file" id="file-input" accept="image/*" capture="environment">
  <div id="upload-icon">📷</div>
  <p><strong>Tap to take a photo</strong> or upload from camera roll</p>
</div>

<div id="preview-wrap">
  <img id="preview-img" alt="Ingredient label">
  <button id="clear-btn" onclick="clearImage()">✕</button>
</div>

<button id="scan-btn" onclick="scan()">Scan Ingredients</button>

<div id="loading">
  <div class="spinner"></div>
  Reading ingredients…
</div>

<div id="error-msg"></div>

<div id="result">
  <div id="verdict-bar">
    <div id="verdict-emoji"></div>
    <div id="verdict-text"></div>
    <div id="verdict-caveat"></div>
  </div>
  <div id="flags-section" style="display:none">
    <h3>Flagged Ingredients</h3>
    <div id="flags-list"></div>
  </div>
</div>

<button id="again-btn" onclick="resetAll()">Scan Another</button>

<script>
  let imageBase64 = null;

  const fileInput = document.getElementById('file-input');
  const uploadZone = document.getElementById('upload-zone');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');
  const scanBtn = document.getElementById('scan-btn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const againBtn = document.getElementById('again-btn');
  const errorMsg = document.getElementById('error-msg');

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      imageBase64 = dataUrl.split(',')[1];
      previewImg.src = dataUrl;
      previewWrap.style.display = 'block';
      uploadZone.style.display = 'none';
      scanBtn.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  function clearImage() {
    imageBase64 = null;
    fileInput.value = '';
    previewWrap.style.display = 'none';
    uploadZone.style.display = 'block';
    scanBtn.style.display = 'none';
    result.style.display = 'none';
    againBtn.style.display = 'none';
    errorMsg.style.display = 'none';
  }

  function resetAll() {
    clearImage();
  }

  async function scan() {
    if (!imageBase64) return;

    scanBtn.disabled = true;
    loading.style.display = 'block';
    result.style.display = 'none';
    errorMsg.style.display = 'none';
    againBtn.style.display = 'none';

    const prompt = `You are a vegan ingredient checker. Analyze this ingredient label photo and respond ONLY with a JSON object — no markdown, no explanation outside the JSON.

Return this exact structure:
{
  "verdict": "vegan" | "not_vegan" | "maybe",
  "caveat": "string or null",
  "flags": [
    {
      "ingredient": "ingredient name as listed",
      "type": "not_vegan" | "ambiguous",
      "note": "brief reason"
    }
  ]
}

Rules:
- "vegan": no animal-derived ingredients found
- "not_vegan": contains clearly non-vegan ingredients (milk, eggs, meat, gelatin, lard, whey, casein, carmine, isinglass, etc.)
- "maybe": only issues are ambiguous ingredients like honey, processed/refined sugar, natural flavors, mono and diglycerides, vitamin D3, lanolin, shellac, L-cysteine, albumen, or similar
- caveat: if verdict is "vegan" or "maybe" and the only flags are practice-dependent (like honey or refined sugar), add a short caveat string e.g. "Vegan if refined sugar is okay with you" or "Contains honey, which some vegans avoid". Otherwise null.
- flags: list every non-vegan or ambiguous ingredient found. Empty array if none.
- If you cannot read the ingredients clearly, set verdict to "maybe" and add a caveat saying the label was unclear.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: {
                  type: 'base64',
                  media_type: 'image/jpeg',
                  data: imageBase64
                }
              },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();
      const raw = data.content.find(b => b.type === 'text')?.text || '';
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      showResult(parsed);

    } catch (err) {
      errorMsg.textContent = 'Something went wrong reading the label. Try a clearer photo.';
      errorMsg.style.display = 'block';
      againBtn.style.display = 'block';
    } finally {
      loading.style.display = 'none';
      scanBtn.disabled = false;
    }
  }

  function showResult(data) {
    const verdictBar = document.getElementById('verdict-bar');
    const verdictEmoji = document.getElementById('verdict-emoji');
    const verdictText = document.getElementById('verdict-text');
    const verdictCaveat = document.getElementById('verdict-caveat');
    const flagsSection = document.getElementById('flags-section');
    const flagsList = document.getElementById('flags-list');

    verdictBar.className = '';

    if (data.verdict === 'vegan') {
      verdictBar.classList.add('vegan');
      verdictEmoji.textContent = '✅';
      verdictText.textContent = 'Vegan';
    } else if (data.verdict === 'not_vegan') {
      verdictBar.classList.add('not-vegan');
      verdictEmoji.textContent = '🚫';
      verdictText.textContent = 'Not Vegan';
    } else {
      verdictBar.classList.add('maybe');
      verdictEmoji.textContent = '⚠️';
      verdictText.textContent = 'Check Before You Buy';
    }

    verdictCaveat.textContent = data.caveat || '';

    if (data.flags && data.flags.length > 0) {
      flagsSection.style.display = 'block';
      flagsList.innerHTML = data.flags.map(f => `
        <div class="flag-item">
          <div class="flag-dot ${f.type === 'not_vegan' ? 'red' : 'yellow'}"></div>
          <div>
            <div class="flag-name">${f.ingredient}</div>
            <div class="flag-note">${f.note}</div>
          </div>
        </div>
      `).join('');
    } else {
      flagsSection.style.display = 'none';
    }

    result.style.display = 'block';
    againBtn.style.display = 'block';
  }
</script>
</body>
</html>
